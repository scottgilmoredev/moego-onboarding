<script>
  /**
   * Upload Script
   *
   * @module
   * @description Client-side handler for the vaccination record upload step on
   * the client landing page. Manages file selection, pre-upload validation,
   * sequential google.script.run uploads, and all button and status UI state
   * transitions. Rendered into the page at request time via
   * HtmlService.createHtmlOutputFromFile — GAS template tags (token, uploadCount,
   * businessPhone) are resolved server-side before delivery to the browser.
   */
  (function () {
    var input = document.getElementById('vaccine-upload');
    var label = document.getElementById('vaccine-label');
    var statusEl = document.getElementById('vaccine-status');
    var errorEl = document.getElementById('vaccine-error');
    var token = '<?= token ?>';
    var uploadCount = parseInt(input.dataset.uploadCount, 10) || 0;
    var businessPhone = input.dataset.businessPhone;
    var UPLOAD_CAP = 5;

    function showStatus(text) {
      statusEl.textContent = text;
      statusEl.style.display = 'block';
    }

    function lockAtCap() {
      label.textContent = 'Upload';
      label.className = 'btn btn-limit-reached';
      label.removeAttribute('for');
      input.disabled = true;
      showStatus('Maximum uploads reached');
    }

    function resetToUpload() {
      label.textContent = 'Upload';
      label.className = 'btn';
      label.setAttribute('for', 'vaccine-upload');
      input.disabled = false;
      input.value = '';
    }

    // Apply initial state on page load
    if (uploadCount >= UPLOAD_CAP) {
      lockAtCap();
    } else if (uploadCount > 0) {
      showStatus(uploadCount + ' file' + (uploadCount === 1 ? '' : 's') + ' uploaded');
    }

    input.addEventListener('change', function (e) {
      var file = e.target.files[0];
      if (!file) return;

      // Clear any previous error and transition to uploading state
      errorEl.style.display = 'none';
      errorEl.textContent = '';
      label.textContent = 'Uploading...';
      label.className = 'btn btn-uploading';
      label.removeAttribute('for');
      input.disabled = true;

      var reader = new FileReader();

      reader.onload = function (event) {
        // Strip the data URL prefix to get the raw base64 string
        var base64 = event.target.result.split(',')[1];

        google.script.run
          .withSuccessHandler(function () {
            uploadCount++;

            // Show green success state briefly, then reset or lock
            label.textContent = 'Uploaded';
            label.className = 'btn btn-uploaded';
            showStatus(uploadCount + ' file' + (uploadCount === 1 ? '' : 's') + ' uploaded');

            setTimeout(function () {
              if (uploadCount >= UPLOAD_CAP) {
                lockAtCap();
              } else {
                resetToUpload();
              }
            }, 2000);
          })
          .withFailureHandler(function () {
            // Reset button to allow retry and show error with phone fallback
            label.textContent = 'Try again';
            label.className = 'btn btn-upload-error';
            label.setAttribute('for', 'vaccine-upload');
            input.disabled = false;
            input.value = '';
            errorEl.textContent = 'Upload failed — please try again or call us at ' + businessPhone;
            errorEl.style.display = 'block';
          })
          .uploadVaccinationRecord(file.name, file.type, base64, token);
      };

      reader.readAsDataURL(file);
    });
  })();
</script>
