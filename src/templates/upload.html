<script>
  /**
   * Upload Script
   *
   * @module
   * @description Client-side handler for the vaccination record upload step on
   * the client landing page. Manages file selection, pre-upload validation,
   * sequential google.script.run uploads, and all button and status UI state
   * transitions. Rendered into the page at request time via
   * HtmlService.createHtmlOutputFromFile — GAS template tags (token, uploadCount,
   * businessPhone) are resolved server-side before delivery to the browser.
   */
  (function () {
    var input = document.getElementById('vaccine-upload');
    var label = document.getElementById('vaccine-label');
    var statusEl = document.getElementById('vaccine-status');
    var errorEl = document.getElementById('vaccine-error');
    var token = '<?= token ?>';
    var uploadCount = parseInt(input.dataset.uploadCount, 10) || 0;
    var businessPhone = input.dataset.businessPhone;
    var UPLOAD_CAP = 5;
    var MAX_BYTES = 10 * 1024 * 1024;
    var ALLOWED_TYPES = ['application/pdf', 'image/jpeg', 'image/png'];

    var UPLOAD_ICON =
      '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"' +
      ' fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"' +
      ' stroke-linejoin="round" aria-hidden="true">' +
      '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>' +
      '<polyline points="17 8 12 3 7 8"/>' +
      '<line x1="12" y1="3" x2="12" y2="15"/>' +
      '</svg>';

    /**
     * Set the label button's content and state class.
     *
     * @function setLabel
     * @description Sets the label's innerHTML and className in a single call.
     * Used by all state transitions to keep label updates atomic.
     *
     * @param {string} html - HTML content to render inside the label.
     * @param {string} className - CSS class string to apply to the label.
     */
    function setLabel(html, className) {
      label.innerHTML = html;
      label.className = className;
    }

    /**
     * Show a message in the upload status element.
     *
     * @function showStatus
     * @description Displays text in the persistent status element beneath the
     * step description. Used to report cumulative upload count to the user.
     *
     * @param {string} text - The status message to display.
     */
    function showStatus(text) {
      statusEl.textContent = text;
      statusEl.style.display = 'block';
    }

    /**
     * Clear and hide the upload error element.
     *
     * @function hideError
     * @description Resets the error element before a new upload attempt so
     * stale error messages do not persist alongside a fresh upload.
     */
    function hideError() {
      errorEl.textContent = '';
      errorEl.style.display = 'none';
    }

    /**
     * Show a message in the upload error element.
     *
     * @function showError
     * @description Displays an error message beneath the step description.
     * Used for both pre-upload validation failures and server-side upload errors.
     *
     * @param {string} text - The error message to display.
     */
    function showError(text) {
      errorEl.textContent = text;
      errorEl.style.display = 'block';
    }

    /**
     * Lock the upload control when the upload cap has been reached.
     *
     * @function lockAtCap
     * @description Renders the label as permanently disabled and shows a status
     * message. Called on page load if the cap is already met and after the final
     * successful upload in a batch pushes the count to the cap.
     */
    function lockAtCap() {
      setLabel(UPLOAD_ICON + ' Upload Certificate', 'btn btn-limit-reached');
      label.removeAttribute('for');
      
      input.disabled = true;
      
      showStatus('Maximum uploads reached');
    }

    /**
     * Reset the upload control to its default ready state.
     *
     * @function resetToUpload
     * @description Re-enables the label and file input and restores the for
     * attribute so clicking the label re-opens the file picker. Called after a
     * successful upload batch when the cap has not been reached.
     */
    function resetToUpload() {
      setLabel(UPLOAD_ICON + ' Upload Certificate', 'btn');
      label.setAttribute('for', 'vaccine-upload');
      
      input.disabled = false;
      input.value = '';
    }

    /**
     * Read a single file and send it to the server.
     *
     * @function uploadFile
     * @description Reads the file as a base64 data URL and calls
     * uploadVaccinationRecord via google.script.run. Invokes onSuccess or
     * onFailure with the file's device name when the server responds.
     *
     * @param {File} file - The file to upload.
     * @param {Function} onSuccess - Called with file.name on successful upload.
     * @param {Function} onFailure - Called with file.name on failed upload.
     */
    function uploadFile(file, onSuccess, onFailure) {
      var reader = new FileReader();

      reader.onload = function (event) {
        // Strip the data URL prefix (e.g. "data:application/pdf;base64,") to get raw base64
        var base64 = event.target.result.split(',')[1];

        google.script.run
          .withSuccessHandler(function () { onSuccess(file.name); })
          .withFailureHandler(function () { onFailure(file.name); })
          .uploadVaccinationRecord(file.name, file.type, base64, token);
      };

      reader.readAsDataURL(file);
    }

    /**
     * Resolve UI state after all files in a batch have been attempted.
     *
     * @function finalizeBatch
     * @description Updates the cumulative upload count, shows a success status
     * with the original device filenames, and shows an error for any files that
     * failed. After a 2-second delay, transitions to the appropriate final state:
     * locked at cap, error with retry, or reset to ready.
     *
     * @param {object} batch - The batch state object.
     * @param {string[]} batch.successNames - Device filenames of successfully uploaded files.
     * @param {string[]} batch.failedNames - Device filenames of files that failed to upload.
     */
    function finalizeBatch(batch) {
      // Only count files that actually reached the server
      uploadCount += batch.successNames.length;

      if (batch.successNames.length) {
        setLabel(UPLOAD_ICON + ' Uploaded', 'btn btn-uploaded');
        // Show device filenames so the user can confirm what was received
        showStatus(
          uploadCount + ' file' + (uploadCount === 1 ? '' : 's') + ' uploaded: ' + batch.successNames.join(', ')
        );
      }

      if (batch.failedNames.length) {
        showError(
          'Failed to upload: ' +
            batch.failedNames.join(', ') +
            ' — please try again or call us at ' +
            businessPhone
        );
      }

      // Hold the success/error state briefly so the user can read it before
      // transitioning to the next actionable state
      setTimeout(function () {
        if (uploadCount >= UPLOAD_CAP) {
          lockAtCap();
        } else if (batch.failedNames.length) {
          // Partial failure — re-enable so the user can retry the failed files
          setLabel(UPLOAD_ICON + ' Try again', 'btn btn-upload-error');
          label.setAttribute('for', 'vaccine-upload');
          input.disabled = false;
          input.value = '';
        } else {
          resetToUpload();
        }
      }, 2000);
    }

    /**
     * Advance through a batch of files sequentially.
     *
     * @function nextInBatch
     * @description Updates the progress label and delegates to uploadFile for
     * the current index. On completion, recurses to the next index. When all
     * files have been attempted, delegates to finalizeBatch.
     *
     * @param {object} batch - The batch state object.
     * @param {File[]} batch.files - The full array of files selected for this batch.
     * @param {string[]} batch.successNames - Accumulator for successfully uploaded device filenames.
     * @param {string[]} batch.failedNames - Accumulator for failed device filenames.
     * @param {number} index - Index of the next file to upload.
     */
    function nextInBatch(batch, index) {
      if (index >= batch.files.length) {
        finalizeBatch(batch);
        return;
      }

      setLabel('Uploading ' + (index + 1) + ' of ' + batch.files.length + '...', 'btn btn-uploading');

      uploadFile(
        batch.files[index],
        function (name) {
          batch.successNames.push(name);
          nextInBatch(batch, index + 1);
        },
        function (name) {
          batch.failedNames.push(name);
          // Continue rather than abort — attempt remaining files in the batch
          nextInBatch(batch, index + 1);
        }
      );
    }

    /**
     * Initialize a batch state object and begin sequential upload.
     *
     * @function startBatch
     * @description Creates the batch state object and kicks off nextInBatch at
     * index 0. All batch state is carried in the object rather than closed over,
     * keeping finalizeBatch and nextInBatch at IIFE scope.
     *
     * @param {File[]} files - The files selected for this batch.
     */
    function startBatch(files) {
      nextInBatch({ files: files, successNames: [], failedNames: [] }, 0);
    }

    // Apply initial state based on uploadCount from the token payload
    if (uploadCount >= UPLOAD_CAP) {
      lockAtCap();
    } else if (uploadCount > 0) {
      showStatus(uploadCount + ' file' + (uploadCount === 1 ? '' : 's') + ' uploaded');
    }

    input.addEventListener('change', function (e) {
      var files = Array.prototype.slice.call(e.target.files);
      
      if (!files.length) return;

      hideError();

      // Validate all files before uploading any — surface all errors at once
      // rather than discovering them mid-batch
      var invalidType = files.filter(function (f) {
        return ALLOWED_TYPES.indexOf(f.type) === -1;
      });

      var oversized = files.filter(function (f) {
        return f.size > MAX_BYTES;
      });

      var remaining = UPLOAD_CAP - uploadCount;

      if (invalidType.length) {
        showError(
          (invalidType.length === 1
            ? '"' + invalidType[0].name + '" is'
            : invalidType.length + ' files are') +
            ' not a supported format. Please upload a PDF, JPG, or PNG.'
        );
        
        input.value = '';
        
        return;
      }

      if (oversized.length) {
        showError(
          (oversized.length === 1
            ? '"' + oversized[0].name + '" exceeds'
            : oversized.length + ' files exceed') + ' the 10 MB limit.'
        );
        
        input.value = '';
        
        return;
      }

      if (files.length > remaining) {
        showError(
          'You can upload ' +
            remaining +
            ' more file' +
            (remaining === 1 ? '' : 's') +
            '. Please select fewer files.'
        );
        
        input.value = '';
        
        return;
      }

      // Lock the UI and begin sequential uploads
      setLabel('Uploading 1 of ' + files.length + '...', 'btn btn-uploading');
      label.removeAttribute('for');
      input.disabled = true;

      startBatch(files);
    });
  })();
</script>
