<style>
  /* =========================================================================
     Reset
     ========================================================================= */

  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* =========================================================================
     Base
     ========================================================================= */

  body {
    background-color: #f5f2f0;
    color: #333333;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.375;
    min-height: 100vh;
    padding: 32px 20px;
  }

  .container {
    margin: 0 auto;
    max-width: 600px;
  }

  /* =========================================================================
     Header — circular logo + business name
     ========================================================================= */

  .header {
    align-items: center;
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
  }

  /* background-image is injected inline at render time — cannot live here */
  .logo {
    background-position: center;
    background-size: cover;
    border-radius: 9999px;
    flex-shrink: 0;
    height: 80px;
    width: 80px;
  }

  .business-name {
    color: #00112c;
    font-size: 16px;
    font-weight: 400;
  }

  /* =========================================================================
     Page content — title and intro text rendered directly on background
     ========================================================================= */

  .page-title {
    color: #00112c;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 10px;
    margin-top: 20px;
  }

  .page-body {
    margin-bottom: 24px;
  }

  .page-body p {
    color: #333333;
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .page-body p:last-child {
    margin-bottom: 0;
  }

  /* =========================================================================
     Card — white surface used for the steps list
     ========================================================================= */

  .card {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 -8px 20px 0 rgba(0, 0, 0, 0.06);
    margin-bottom: 16px;
    padding: 32px;
  }

  .steps-title {
    color: #00112c;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  /* =========================================================================
     Steps — individual onboarding action rows within the card
     ========================================================================= */

  .step {
    align-items: center;
    border-bottom: 1px solid #e9ecef;
    display: flex;
    gap: 16px;
    justify-content: space-between;
    padding: 16px 0;
  }

  .step:first-child {
    padding-top: 0;
  }

  .step:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  .step-info {
    flex: 1;
  }

  .step-label {
    color: #00112c;
    font-size: 16px;
    font-weight: 600;
  }

  .step-description {
    color: #888c96;
    font-size: 14px;
    margin-top: 2px;
  }


  /* =========================================================================
     Buttons
     ========================================================================= */

  .btn {
    align-items: center;
    background-color: #29a8e0;
    border: none;
    border-radius: 28px;
    color: #ffffff;
    cursor: pointer;
    display: inline-flex;
    flex-shrink: 0;
    font-family: inherit;
    font-size: 18px;
    font-weight: 500;
    gap: 8px;
    height: 56px;
    justify-content: center;
    padding: 0 28px;
    text-decoration: none;
    transition: background-color 0.2s ease-out;
    white-space: nowrap;
  }

  .btn:hover {
    background-color: #1e8fc0;
  }

  /* Non-functional placeholder — file upload not yet implemented */
  .btn-disabled {
    cursor: not-allowed;
    opacity: 0.4;
  }

    /* Upload in progress — prevent re-click */
  .btn-uploading {
    cursor: not-allowed;
    opacity: 0.6;
    pointer-events: none;
  }

  /* Upload succeeded — temporary state, resets after 3 seconds */
  .btn-uploaded {
    background-color: #28a745;
    cursor: not-allowed;
    pointer-events: none;
  }

  .btn-uploaded:hover {
    background-color: #28a745;
  }

  /* Upload limit reached — permanent locked state */
  .btn-limit-reached {
    background-color: #888c96;
    cursor: not-allowed;
    opacity: 0.5;
  }

  .btn-limit-reached:hover {
    background-color: #888c96;
  }

  /* Upload failed — allow retry */
  .btn-upload-error {
    background-color: #dc3545;
  }

  .btn-upload-error:hover {
    background-color: #b02a37;
  }

  .step-upload-status {
    color: #333333;
    font-size: 13px;
    font-weight: 600;
    margin-top: 4px;
  }

  .step-upload-error {
    color: #dc3545;
    font-size: 13px;
    margin-top: 4px;
  }

  .step-upload-hint {
    color: #888c96;
    font-size: 13px;
    margin-top: 4px;
  }

  #vaccine-label {
    min-width: 220px;
  }

  /* Hidden file input — triggered by the Upload label button */
  #vaccine-upload {
    display: none;
  }

     Error page
     ========================================================================= */

  .error-card {

    font-weight: 700;
    margin-bottom: 12px;
  }

  .error-body {
    color: #888c96;
    font-size: 16px;
    max-width: 400px;
  }

  /* =========================================================================
     Footer
     ========================================================================= */

  .footer {
    color: #888c96;
    font-size: 13px;
    margin-top: 24px;
    text-align: center;
  }
</style>
