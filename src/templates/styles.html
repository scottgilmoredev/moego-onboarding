<style>
  /* =========================================================================
     Reset
     ========================================================================= */

  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* =========================================================================
     Base
     ========================================================================= */

  body {
    background-color: #f5f2f0;
    color: #333333;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.375;
    min-height: 100vh;
    padding: 32px 20px;
  }

  .container {
    margin: 0 auto;
    max-width: 600px;
  }

  /* =========================================================================
     Header — circular logo + business name
     ========================================================================= */

  .header {
    align-items: center;
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
  }

  /* background-image is injected inline at render time — cannot live here */
  .logo {
    background-position: center;
    background-size: cover;
    border-radius: 9999px;
    flex-shrink: 0;
    height: 80px;
    width: 80px;
  }

  .business-name {
    color: #00112c;
    font-size: 16px;
    font-weight: 400;
  }

  /* =========================================================================
     Page content — title and intro text rendered directly on background
     ========================================================================= */

  .page-title {
    color: #00112c;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 10px;
    margin-top: 20px;
  }

  .page-body {
    margin-bottom: 24px;
  }

  .page-body p {
    color: #333333;
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .page-body p:last-child {
    margin-bottom: 0;
  }

  /* =========================================================================
     Card — white surface used for the steps list
     ========================================================================= */

  .card {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 -8px 20px 0 rgba(0, 0, 0, 0.06);
    margin-bottom: 16px;
    padding: 32px;
  }

  .steps-title {
    color: #00112c;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  /* =========================================================================
     Steps — individual onboarding action rows within the card
     ========================================================================= */

  .step {
    align-items: center;
    border-bottom: 1px solid #e9ecef;
    display: flex;
    gap: 16px;
    justify-content: space-between;
    padding: 16px 0;
  }

  .step:first-child {
    padding-top: 0;
  }

  .step:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  .step-upload {
    align-items: start;
    display: grid;
    gap: 0 16px;
    grid-template-columns: 1fr auto;
  }

  #vaccine-content {
    grid-column: 1 / -1;
  }

  .step-info {
    flex: 1;
  }

  .step-label {
    color: #00112c;
    font-size: 16px;
    font-weight: 600;
  }

  .step-description {
    color: #888c96;
    font-size: 14px;
    margin-top: 2px;
  }

  .step-upload-hint {
    color: #888c96;
    font-size: 13px;
    margin-top: 12px;
  }

  /* =========================================================================
     Buttons
     ========================================================================= */

  .btn {
    align-items: center;
    background-color: #29a8e0;
    border: none;
    border-radius: 28px;
    color: #ffffff;
    cursor: pointer;
    display: inline-flex;
    flex-shrink: 0;
    font-family: inherit;
    font-size: 18px;
    font-weight: 500;
    gap: 8px;
    height: 56px;
    justify-content: center;
    padding: 0 28px;
    text-decoration: none;
    transition: background-color 0.2s ease-out;
    white-space: nowrap;
  }

  .btn:hover {
    background-color: #1e8fc0;
  }

  button.btn:disabled {
    background-color: #e2e6ea;
    color: #9aa4b0;
    cursor: not-allowed;
  }

  button.btn:disabled:hover {
    background-color: #e2e6ea;
  }

  /* Hidden file input — triggered by the upload button via input.click() */
  #vaccine-upload {
    display: none;
  }

  /* =========================================================================
     Upload step — file list, banners, and capacity strip
     ========================================================================= */

  /* ── Empty placeholder ── */

  .b-empty {
    background: #fbfbfa;
    border: 1.5px dashed #d3d8df;
    border-radius: 12px;
    margin-top: 10px;
    padding: 22px 16px;
    text-align: center;
  }

  .b-empty-ic {
    align-items: center;
    background: #e7f1fb;
    border-radius: 12px;
    color: #2e8bd2;
    display: inline-flex;
    height: 44px;
    justify-content: center;
    margin-bottom: 10px;
    width: 44px;
  }

  .b-empty-lead {
    color: #0f1d2e;
    font-size: 14.5px;
    font-weight: 600;
  }

  .b-empty-hint {
    color: #7a8595;
    font-size: 12.5px;
    margin-top: 4px;
  }

  /* ── File rows ── */

  .b-files {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
  }

  .b-file {
    align-items: center;
    background: #fafbfc;
    border: 1px solid #eef0f3;
    border-radius: 10px;
    display: grid;
    gap: 12px;
    grid-template-columns: 40px 1fr auto;
    padding: 10px 12px;
  }

  .b-file-uploading {
    background: #f6faff;
    border-color: #d6e7f5;
  }

  .b-file-error {
    background: #fbe9e7;
    border-color: #f3c8c2;
  }

  .b-file-icn {
    align-items: center;
    background: #eef1f5;
    border-radius: 8px;
    color: #3b4858;
    display: flex;
    flex-shrink: 0;
    height: 40px;
    justify-content: center;
    overflow: hidden;
    width: 40px;
  }

  .b-file-icn-pdf {
    background: #fbe9e7;
    color: #c2453a;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    font-weight: 700;
  }

  .b-file-icn-broken {
    background: #f3c8c2;
    color: #c2453a;
  }

  .b-file-img {
    display: block;
    height: 100%;
    object-fit: cover;
    width: 100%;
  }

  /* Placeholder pattern for images when object URL is unavailable */
  .b-file-thumb {
    background: repeating-linear-gradient(45deg, #d8dde4 0 5px, #cfd5dd 5px 10px);
    height: 100%;
    width: 100%;
  }

  .b-file-info {
    min-width: 0;
  }

  .b-file-nm {
    color: #0f1d2e;
    font-size: 13.5px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .b-file-nm-err {
    color: #7a2620;
  }

  .b-file-meta {
    align-items: center;
    color: #7a8595;
    display: flex;
    flex-wrap: wrap;
    font-size: 12px;
    gap: 6px;
    margin-top: 2px;
  }

  .b-file-dot {
    background: #c8cfd8;
    border-radius: 999px;
    flex-shrink: 0;
    height: 3px;
    width: 3px;
  }

  .b-file-size {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
  }

  .b-file-uploading-text {
    color: #2e8bd2;
    font-weight: 600;
  }

  .b-file-meta-err {
    color: #c2453a;
    font-weight: 600;
  }

  .b-file-check {
    color: #2f9e6b;
    flex-shrink: 0;
  }

  /* Spacer keeps the success/uploading row grid consistent with the 3-column layout */
  .b-file-spacer {
    flex-shrink: 0;
    width: 18px;
  }

  /* ── Progress bar ── */

  .b-progress {
    background: #e0ecf7;
    border-radius: 999px;
    height: 4px;
    margin-top: 6px;
    overflow: hidden;
  }

  .b-progress-bar {
    animation: b-shimmer 1.4s linear infinite;
    background: linear-gradient(90deg, transparent, #4ea3e0 40%, #4ea3e0 60%, transparent);
    border-radius: 999px;
    height: 100%;
    width: 40%;
  }

  @keyframes b-shimmer {
    0%   { transform: translateX(-250%); }
    100% { transform: translateX(350%); }
  }

  /* ── Per-row retry button ── */

  .b-file-retry {
    appearance: none;
    background: #fff;
    border: 1px solid #e8b6af;
    border-radius: 7px;
    color: #7a2620;
    cursor: pointer;
    flex-shrink: 0;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 11px;
  }

  .b-file-retry:hover {
    border-color: #c2453a;
  }

  /* ── Per-row action button group ── */

  .b-file-actions {
    align-items: center;
    display: flex;
    flex-shrink: 0;
    gap: 4px;
  }

  .b-file-remove {
    align-items: center;
    appearance: none;
    background: transparent;
    border: none;
    border-radius: 6px;
    color: #9aa4b0;
    cursor: pointer;
    display: flex;
    flex-shrink: 0;
    height: 28px;
    justify-content: center;
    padding: 0;
    width: 28px;
  }

  .b-file-remove:hover {
    background: #f0f2f5;
    color: #4a5568;
  }

  /* ── Capacity strip ── */

  .b-slots {
    align-items: center;
    color: #7a8595;
    display: flex;
    font-size: 12.5px;
    justify-content: space-between;
    margin-top: 10px;
  }

  .b-slots-left {
    align-items: center;
    display: inline-flex;
    gap: 8px;
  }

  .b-slots-pips {
    display: inline-flex;
    gap: 4px;
  }

  .b-slots-pip {
    background: #e2e6ea;
    border-radius: 999px;
    height: 6px;
    width: 18px;
  }

  .b-slots-pip-on {
    background: #2f9e6b;
  }

  /* ── Maximum reached banner ── */

  .b-max-banner {
    align-items: center;
    background: #e3f3eb;
    border: 1px solid #c5e3d3;
    border-radius: 10px;
    display: grid;
    gap: 12px;
    grid-template-columns: 32px 1fr;
    margin-top: 12px;
    padding: 12px 14px;
  }

  .b-max-banner-badge {
    align-items: center;
    background: #fff;
    border-radius: 999px;
    color: #2f9e6b;
    display: flex;
    flex-shrink: 0;
    height: 32px;
    justify-content: center;
    width: 32px;
  }

  .b-max-banner-text {
    color: #0f4a30;
    font-size: 13px;
    line-height: 1.45;
  }

  /* ── Global error banner ── */

  .b-err-banner {
    align-items: center;
    background: #fbe9e7;
    border: 1px solid #f3c8c2;
    border-radius: 10px;
    display: grid;
    gap: 12px;
    grid-template-columns: 32px 1fr auto;
    margin-top: 10px;
    padding: 12px 14px;
  }

  .b-err-banner-badge {
    align-items: center;
    background: #fff;
    border-radius: 999px;
    color: #c2453a;
    display: flex;
    flex-shrink: 0;
    height: 32px;
    justify-content: center;
    width: 32px;
  }

  .b-err-banner-text {
    color: #7a2620;
    font-size: 13px;
    line-height: 1.45;
  }

  .b-err-banner-retry {
    appearance: none;
    background: #fff;
    border: 1px solid #e8b6af;
    border-radius: 8px;
    color: #7a2620;
    cursor: pointer;
    flex-shrink: 0;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 600;
    padding: 8px 12px;
  }

  .b-err-banner-retry:hover {
    border-color: #c2453a;
  }

  /* =========================================================================
     Error page
     ========================================================================= */

  .error-card {
    align-items: center;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 -8px 20px 0 rgba(0, 0, 0, 0.06);
    display: flex;
    flex-direction: column;
    padding: 48px 32px;
    text-align: center;
  }

  .error-title {
    color: #00112c;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .error-body {
    color: #888c96;
    font-size: 16px;
    max-width: 400px;
  }

  /* =========================================================================
     Footer
     ========================================================================= */

  .footer {
    color: #888c96;
    font-size: 13px;
    margin-top: 24px;
    text-align: center;
  }
</style>
