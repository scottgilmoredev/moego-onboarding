name: Deploy

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  deploy-staging:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Configure clasp auth
        run: echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json

      - name: Configure clasp target
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID_STAGING }}
        run: jq --arg id "$SCRIPT_ID" '.scriptId = $id' .clasp.template.json > .clasp.json

      - name: Build and push
        run: pnpm build && clasp push --force

  deploy-prod:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Configure clasp auth
        run: echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json

      - name: Configure clasp target
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID_PROD }}
        run: jq --arg id "$SCRIPT_ID" '.scriptId = $id' .clasp.template.json > .clasp.json

      - name: Build and push
        run: pnpm build && clasp push --force
